                <h1>Zarejestruj się</h1>
                <form method="post" action="odbierz.php">

                    <label for="name">Imię:</label>
                    <div class="wraper">
                        <input placeholder="..." type="text" id="name" name="name" required>
                    </div>

                    <label for="surname">Nazwisko:</label>
                    <div class="wraper">
                        <input placeholder="..." type="text" id="surname" name="surname" required>
                    </div>

                    <div style="color: #fff; padding: 20px 0; font-weight: 400;width: 100%;"></div>

                    <div class="wraper" style="width: 50%; padding: 10px;">
                        <input title ="Podaj swój email" placeholder="Email" type="text"  name="email" required>
                    </div>

                    <div class="wraper" style="width: 50%; padding: 10px;">
                        <input title ="Podaj swoje hasło" placeholder="Password" type="password" name="password" required>
                    </div>

                    <label style="padding: 20px 0;">Płeć:</label>
                    <div style="width: 100%; height: 30px; display: flex; flex-direction: row;align-items: center; justify-content: space-evenly;">
                        <div class="checkButtonHolder">
                            <input type="radio" id="male" name="gender" value="male">
                            <label class="radioButton" for="male">Mężczyzna</label>
                        </div>
                        <div class="checkButtonHolder">
                            <input type="radio" id="female" name="gender" value="female">
                            <label class="radioButton" for="female">Kobieta</label>
                        </div>
                    </div>

                    <label for="voivodeships" style="padding: 20px 0;">Województwo:</label>
                    <div class="selectContainer">
                        <select id="voivodeships" name="voivodeships">
                        <option value="dolnoslaskie">Dolnośląskie</option>
                            <option value="kujawsko-pomorskie">Kujawsko-Pomorskie</option>
                            <option value="lubelskie">Lubelskie</option>
                            <option value="lubuskie">Lubuskie</option>
                            <option value="lodzkie">Łódzkie</option>
                            <option value="malopolskie">Małopolskie</option>
                            <option value="mazowieckie">Mazowieckie</option>
                            <option value="opolskie">Opolskie</option>
                            <option value="podkarpackie">Podkarpackie</option>
                            <option value="podlaskie">Podlaskie</option>
                            <option value="pomorskie">Pomorskie</option>
                            <option value="slaskie">Śląskie</option>
                            <option value="swietokrzyskie">Świętokrzyskie</option>

                            <option value="zachodniopomorskie">Zachodniopomorskie</option>
                        </select>
                    </div>
                <label style="padding: 20px 0;">Jakie rodzaje filmów cię interesują?:</label>
                    <div class="checkboxsContainer">
                        <div class="checkButtonHolder">
                            <input type="checkbox" id="action" name="genre" value="action">
                            <label style="font-size: 16px;" for="action">Akcja</label>
                        </div>
                        <div class="checkButtonHolder">
                            <input type="checkbox" id="comedy" name="genre" value="comedy">
                            <label style="font-size: 16px;" for="comedy">Komedia</label>
                        </div>
                        <div class="checkButtonHolder">
                            <input type="checkbox" id="drama" name="genre" value="drama">

                        <div class="checkButtonHolder">
                            <input type="checkbox" id="horror" name="genre" value="horror">

                            <input type="checkbox" id="thriller" name="genre" value="thriller">

                            <input type="checkbox" id="documentary" name="genre" value="documentary">
                            <label style="font-size: 16px;" for="documentary">Dokumentalny</label>
